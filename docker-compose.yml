services:
  appaltoai:
    build: .
    container_name: appaltoai
    ports:
      - "8000:8000"
    volumes:
      - appaltoai-data:/app/data
      - appaltoai-models:/app/models
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - APPALTOAI_LOG_LEVEL=INFO
      - APPALTOAI_CORS_ORIGINS=*
      - APPALTOAI_HOST=0.0.0.0
      - APPALTOAI_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  appaltoai-data:
  appaltoai-models:
